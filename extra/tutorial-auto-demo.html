<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tutorial: Auto-Demo Mockup</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* ═══════════════════════════════════════════════════════════
     EXACT GAME CSS — dark mode defaults
     ═══════════════════════════════════════════════════════════ */
  :root {
    --bg: #0f0f0f; --surface: #1a1a1a; --border: #2a2a2a; --text: #f0ede8;
    --muted: #888480; --accent: #818CF8; --accent-rgb: 129, 140, 248;
    --accent-dark: #6366F1; --accent-light: #1e1b4b; --accent-text: #A5B4FC;
    --danger: #e05c4b; --danger-light: #2a1210;
    --success: #4caf7a; --success-light: #0a2016;
    --shadow-sm: 0 1px 4px rgba(0,0,0,0.3); --shadow-md: 0 4px 16px rgba(0,0,0,0.4);
    --shadow-lg: 0 8px 32px rgba(0,0,0,0.5); --radius: 10px;
    --tl-card-w: 155px; --tl-card-h: 180px; --tl-emoji-h: 52px;
    --tl-tick-h: 18px; --tl-line-top: 18px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body { font-family: 'Source Sans 3', sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; }

  /* ── Game layout ── */
  #screen-game { display: flex; flex-direction: column; flex: 1; overflow: hidden; position: relative; }
  .game-header {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 10px 20px; display: flex; align-items: center; justify-content: space-between;
    flex-shrink: 0; height: 52px;
  }
  .game-stats { display: flex; align-items: center; gap: 14px; width: 100%; }
  .score-display { display: flex; align-items: baseline; gap: 5px; font-size: 13px; color: var(--muted); font-weight: 500; }
  .score-display strong { color: var(--text); font-size: 18px; font-weight: 700; }
  .lives { display: flex; gap: 6px; align-items: center; }
  .heart { font-size: 34px; color: var(--danger); }
  .btn-quit { margin-left: auto; background: transparent; border: 1.5px solid var(--border); border-radius: 8px; padding: 5px 10px; font-size: 12px; font-weight: 700; color: var(--muted); cursor: pointer; font-family: inherit; }

  /* ── Card stage ── */
  .card-stage {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    flex-shrink: 0; height: 225px; background: var(--bg); gap: 6px; position: relative;
  }
  .stage-label { font-size: 10px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 15px; }
  #current-card-container { width: var(--tl-card-w); min-height: var(--tl-card-h); display: flex; align-items: flex-start; justify-content: center; flex-shrink: 0; }

  /* ── Event card (draggable) ── */
  .event-card {
    border: 1.5px solid var(--border); border-radius: var(--radius); cursor: grab; user-select: none;
    box-shadow: var(--shadow-sm); position: relative; overflow: hidden;
    width: var(--tl-card-w); height: var(--tl-card-h); flex-shrink: 0;
    display: flex; flex-direction: column; background: var(--surface);
    touch-action: none; transition: box-shadow 0.15s, border-color 0.15s;
  }
  @keyframes slideUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:none} }
  .event-card { animation: slideUp 0.3s ease; }

  /* ── Card image layout ── */
  .card-stripe { position: absolute; top:0; left:0; right:0; height:3px; border-radius:10px 10px 0 0; flex-shrink:0; }
  .card-img-banner { width: 100%; height: 90px; flex-shrink: 0; overflow: hidden; position: relative; z-index: 0; }
  .card-img-banner img { width: 100%; height: 100%; object-fit: cover; object-position: center 30%; }
  .card-img-banner::after { content:''; position:absolute; bottom:0; left:0; right:0; height:40px; background:linear-gradient(to bottom, transparent, var(--surface)); }
  .card-img-content { flex:1; padding:6px 9px 8px; display:flex; flex-direction:column; justify-content:space-between; overflow:hidden; position:relative; z-index:1; margin-top:-20px; min-height:0; }
  .card-text-wrap { display:flex; flex-direction:column; flex:1; overflow:hidden; min-height:0; }
  .card-img-cat { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:1px; color:#fff; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; flex-shrink:0; margin-bottom:3px; text-shadow:0 1px 3px rgba(0,0,0,0.9),0 0 8px rgba(0,0,0,0.7); }
  .card-img-label { font-family:'Lora',serif; font-size:11px; font-weight:700; color:var(--text); line-height:1.3; overflow:hidden; flex:1; min-height:0; text-shadow:0 1px 4px rgba(255,255,255,0.15); }
  .card-img-sublabel { font-size:10px; color:var(--muted); font-style:italic; overflow:hidden; flex-shrink:0; margin-top:3px; }
  .card-img-year { font-size:10px; font-weight:700; font-family:'Lora',serif; color:var(--text); border-top:1px solid var(--border); padding-top:4px; margin-top:4px; flex-shrink:0; }

  /* ── Timeline ── */
  .timeline-wrapper { flex:1; overflow-x:auto; overflow-y:hidden; padding:42px 12px 20px; position:relative; }
  .timeline-track { display:flex; align-items:flex-start; min-width:max-content; position:relative; }
  .timeline-line { position:absolute; top:var(--tl-line-top); left:0; right:0; height:2px; background:var(--border); pointer-events:none; z-index:0; }

  .tl-item { display:flex; flex-direction:column; align-items:center; position:relative; z-index:2; flex-shrink:0; width:var(--tl-card-w); }
  .tl-item.push-in { animation: pushApart 0.32s cubic-bezier(0.34,1.2,0.64,1) forwards; overflow:hidden; }
  @keyframes pushApart { from{width:0;opacity:0.6} to{width:var(--tl-card-w);opacity:1} }
  .tl-tick { width:2px; height:var(--tl-tick-h); background:#555; flex-shrink:0; }
  .tl-card {
    border:1.5px solid var(--border); border-radius:var(--radius);
    width:var(--tl-card-w); height:var(--tl-card-h); overflow:hidden; flex-shrink:0;
    display:flex; flex-direction:column; background:var(--surface); user-select:none;
  }
  .tl-card.just-correct { border-color:var(--success); border-width:2px; animation:popIn 0.55s cubic-bezier(0.34,1.56,0.64,1); }
  @keyframes popIn { 0%{transform:scale(1)} 25%{transform:scale(1.1)} 60%{transform:scale(0.97)} 100%{transform:scale(1)} }
  .tl-card.just-correct .card-img-banner::after { background:linear-gradient(to bottom, transparent, var(--success-light)); }

  /* ── Drop zones ── */
  .drop-zone {
    width:var(--tl-card-w); flex-shrink:0; height:calc(var(--tl-tick-h)+var(--tl-card-h));
    position:relative; z-index:10; cursor:pointer;
    margin-left:calc(var(--tl-card-w)/-2); margin-right:calc(var(--tl-card-w)/-2);
    background:transparent; transition:margin 0.2s cubic-bezier(0.34,1.1,0.64,1);
    pointer-events:none;
  }
  #screen-game.dragging-active .drop-zone { pointer-events:all; }
  .drop-zone.drag-over { margin-left:0; margin-right:0; }
  .drop-zone.drop-zone-start { width:calc(var(--tl-card-w)+60px); min-width:50vw; margin-left:0; margin-right:calc(var(--tl-card-w)/-2); }
  .drop-zone.drop-zone-start.drag-over { margin-left:0; margin-right:0; }
  .drop-zone.drop-zone-end { width:calc(var(--tl-card-w)+60px); min-width:50vw; margin-left:calc(var(--tl-card-w)/-2); margin-right:0; }
  .drop-zone.drop-zone-end.drag-over { margin-left:0; margin-right:0; }

  /* ═══ TUTORIAL OVERLAY CSS ═══ */
  .tut-scrim { position:fixed; inset:0; z-index:100; background:rgba(0,0,0,0); pointer-events:none; transition:background 0.45s ease; }
  .tut-scrim.on { background:rgba(0,0,0,0.54); pointer-events:all; }

  /* Phase 1: spotlight card stage and timeline */
  #screen-game.tut-p1 .card-stage       { z-index:150; position:relative; }
  #screen-game.tut-p1 .timeline-wrapper  { z-index:150; position:relative; }

  /* Phase 2: spotlight card stage and timeline, glow correct DZ */
  #screen-game.tut-p2 .card-stage       { z-index:150; position:relative; }
  #screen-game.tut-p2 .timeline-wrapper  { z-index:150; position:relative; }
  #screen-game.tut-p2 .drop-zone.tut-correct-dz { z-index:160; pointer-events:all !important; }
  #screen-game.tut-p2 .event-card {
    box-shadow:0 0 0 3px var(--accent),0 0 0 7px rgba(var(--accent-rgb),0.22),0 0 32px 8px rgba(var(--accent-rgb),0.18) !important;
    border-color:var(--accent) !important;
    animation:slideUp 0.3s ease, tutCardPulse 2s ease-in-out 0.5s infinite !important;
  }
  @keyframes tutCardPulse {
    0%,100%{box-shadow:0 0 0 3px var(--accent),0 0 0 7px rgba(var(--accent-rgb),0.18),0 0 28px 6px rgba(var(--accent-rgb),0.12);}
    50%{box-shadow:0 0 0 3px var(--accent),0 0 0 11px rgba(var(--accent-rgb),0.30),0 0 42px 12px rgba(var(--accent-rgb),0.20);}
  }

  /* Correct DZ glow */
  .drop-zone.tut-glow {
    pointer-events: all !important;
    margin-left: 0 !important; margin-right: 0 !important;
  }
  .drop-zone.tut-glow::before {
    content: '';
    position: absolute; inset: 8px;
    border: 2px dashed rgba(var(--accent-rgb), 0.5);
    border-radius: var(--radius);
    animation: dzGlow 2s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes dzGlow {
    0%,100% { border-color: rgba(var(--accent-rgb),0.3); box-shadow: inset 0 0 20px rgba(var(--accent-rgb),0.05); }
    50%     { border-color: rgba(var(--accent-rgb),0.65); box-shadow: inset 0 0 30px rgba(var(--accent-rgb),0.12); }
  }

  /* Pill */
  .tut-pill {
    position:fixed; z-index:210; background:rgba(8,6,3,0.93);
    border:1.5px solid rgba(var(--accent-rgb),0.55); border-radius:24px; padding:11px 20px;
    display:flex; align-items:center; gap:10px; pointer-events:none;
    opacity:0; transform:translateY(8px) scale(0.95);
    transition:opacity 0.4s ease, transform 0.4s cubic-bezier(0.34,1.3,0.64,1);
    backdrop-filter:blur(10px); box-shadow:0 8px 32px rgba(0,0,0,0.3); white-space:nowrap;
  }
  .tut-pill.on { opacity:1; transform:translateY(0) scale(1); }
  .tut-pill-icon { font-size:18px; }
  .tut-pill-text { font-size:13px; font-weight:700; color:#fff; letter-spacing:-0.1px; line-height:1.35; font-family:'Source Sans 3',sans-serif; }
  .tut-pill-text em { color:#818cf8; font-style:normal; }

  /* Step dots */
  .tut-dots { position:fixed; bottom:66px; left:50%; transform:translateX(-50%); z-index:210; display:flex; gap:6px; align-items:center; pointer-events:none; opacity:0; transition:opacity 0.3s; }
  .tut-dots.on { opacity:1; }
  .tut-dot { width:6px; height:6px; border-radius:50%; background:rgba(255,255,255,0.28); transition:background 0.3s,width 0.25s; }
  .tut-dot.active { background:#fff; width:16px; border-radius:3px; }
  .tut-dot.done { background:rgba(129,140,248,0.8); }

  /* Skip */
  .tut-skip { position:fixed; bottom:62px; right:16px; z-index:215; background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.16); border-radius:20px; padding:6px 14px; font-size:11px; font-weight:700; color:rgba(255,255,255,0.42); cursor:pointer; font-family:inherit; opacity:0; transition:opacity 0.3s; backdrop-filter:blur(8px); }
  .tut-skip.on { opacity:1; }
  .tut-skip:hover { color:rgba(255,255,255,0.72); border-color:rgba(255,255,255,0.32); }

  /* Flying card */
  .flying-card {
    position: fixed; z-index: 200; pointer-events: none;
    width: var(--tl-card-w); height: var(--tl-card-h);
    border: 1.5px solid var(--accent); border-radius: var(--radius);
    overflow: hidden; display: flex; flex-direction: column;
    background: var(--surface);
    box-shadow: 0 0 0 3px var(--accent), var(--shadow-lg);
  }
  .flying-card.animate {
    transition: left var(--fly-dur) cubic-bezier(0.34,1.15,0.64,1),
                top var(--fly-dur) cubic-bezier(0.34,1.15,0.64,1),
                transform var(--fly-dur) cubic-bezier(0.34,1.15,0.64,1);
  }

  /* Hand icon that moves with the card */
  .tut-hand {
    position: fixed; z-index: 211; pointer-events: none;
    font-size: 28px; filter: drop-shadow(0 2px 8px rgba(0,0,0,0.5));
    opacity: 0; transition: opacity 0.3s;
  }
  .tut-hand.on { opacity: 1; }
  .tut-hand.animate {
    transition: left var(--fly-dur) cubic-bezier(0.34,1.15,0.64,1),
                top var(--fly-dur) cubic-bezier(0.34,1.15,0.64,1),
                opacity 0.3s;
  }

  /* Phase 2 finger — animated drag hint */
  .tut-finger {
    position: fixed; font-size: 28px; z-index: 210;
    pointer-events: none; opacity: 0;
    filter: drop-shadow(0 2px 8px rgba(0,0,0,0.35));
    transition: opacity 0.3s;
  }
  .tut-finger.on { opacity: 1; }

  /* ── Demo bar ── */
  .demo-bar { background:#111; border-top:1px solid #222; padding:10px 16px; display:flex; align-items:center; justify-content:space-between; flex-shrink:0; gap:10px; flex-wrap:wrap; }
  .demo-lbl { font-size:11px; color:rgba(255,255,255,0.4); font-weight:600; }
  .demo-lbl strong { color:rgba(255,255,255,0.78); }
  .dbtn { background:var(--accent); color:#fff; border:none; border-radius:8px; padding:6px 14px; font-size:11px; font-weight:700; cursor:pointer; font-family:inherit; }
  .dbtn:hover { opacity:0.85; }
  .dbtn.sec { background:transparent; border:1px solid rgba(255,255,255,0.18); color:rgba(255,255,255,0.5); }
</style>
</head>
<body>

<!-- ═══ Tutorial overlays ═══ -->
<div class="tut-scrim" id="tut-scrim"></div>
<div class="tut-hand" id="tut-hand">👆</div>
<div class="tut-finger" id="tut-finger">👆</div>
<div class="tut-pill" id="tut-pill">
  <span class="tut-pill-icon" id="tut-pill-icon">🎯</span>
  <div class="tut-pill-text" id="tut-pill-text">Here's how you play</div>
</div>
<div class="tut-dots" id="tut-dots">
  <div class="tut-dot active" id="dot0"></div>
  <div class="tut-dot" id="dot1"></div>
</div>
<button class="tut-skip" id="tut-skip" onclick="skipTutorial()">Skip tutorial</button>

<!-- ═══ Game screen ═══ -->
<div id="screen-game">
  <header class="game-header">
    <div class="game-stats">
      <div class="score-display"><span>Streak</span><strong id="streak-val">0</strong></div>
      <div class="score-display"><span>Score</span><strong id="score-val">0</strong></div>
      <div class="lives"><span class="heart">♥</span><span class="heart">♥</span><span class="heart">♥</span></div>
      <button class="btn-quit" style="margin-left:auto;">✕ Quit</button>
    </div>
  </header>

  <div class="card-stage" id="card-stage">
    <div class="stage-label"><strong style="font-size:11px;color:var(--text);">WHEN</strong> DOES THIS EVENT BELONG?</div>
    <div id="current-card-container"></div>
  </div>

  <div class="timeline-wrapper" id="timeline-wrapper">
    <div class="timeline-track" id="timeline-track">
      <div class="timeline-line"></div>
    </div>
  </div>
</div>

<!-- ═══ Demo bar ═══ -->
<div class="demo-bar">
  <div class="demo-lbl" id="demo-lbl"><strong>Phase 1</strong> — auto-place</div>
  <div style="display:flex;gap:8px;">
    <button class="dbtn" onclick="reset()">↺ Reset</button>
    <button class="dbtn sec" onclick="jumpP2()">Jump to Phase 2</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
//  TWEAKABLE TIMING CONSTANTS (ms)
// ═══════════════════════════════════════════════════════════
const T = {
  PILL_FADE_IN:       400,   // pill appearance delay after scrim
  DELAY_BEFORE_FLY:   1400,  // pause before card starts flying
  FLY_DURATION:       1500,  // how long the card takes to fly down
  HAND_APPEAR_BEFORE: 400,   // hand appears this long before flight starts
  LAND_SETTLE:        300,   // pause after landing before inserting into TL
  DELAY_BEFORE_P2:    600,   // pause after insert before phase 2 starts
  P2_PILL_DELAY:      400,   // delay before phase 2 pill appears
  P2_GLOW_DELAY:      700,   // delay before correct DZ starts glowing
  P2_FINGER_DELAY:    1000,  // delay before finger animation starts in phase 2
};

// ═══════════════════════════════════════════════════════════
//  SAMPLE DATA (real events from the game)
// ═══════════════════════════════════════════════════════════
const CAT = {
  "Colonial India": { text:"#5e4a7a", bg:"#ede6f5", emoji:"🏴", img:"images/categories/colonial_india.jpg" },
  "Ancient India":  { text:"#7a5c2e", bg:"#f5ede0", emoji:"🏛️", img:"images/categories/ancient_india.jpg" },
  "Medieval India": { text:"#4a5e7a", bg:"#e6edf5", emoji:"⚔️", img:"images/categories/medieval_india.jpg" },
};

// Timeline starts with one card already placed
const SEED_CARD = { id:1, label:"Battle of Plassey",     sublabel:"fought",    year:1757, cat:"Colonial India" };
// Phase 1: this card auto-flies (free point)
const P1_CARD   = { id:2, label:"Indian National Congress", sublabel:"founded", year:1885, cat:"Colonial India" };
// Phase 2: user places this card
const P2_CARD   = { id:3, label:"Sepoy Mutiny",           sublabel:"began",    year:1857, cat:"Colonial India" };

// Timeline state
let timeline = [];
let phase = 0; // 0=idle, 1=phase1, 2=phase2

function fy(y){ return y < 0 ? Math.abs(y)+' BCE' : y+' CE'; }

// ═══════════════════════════════════════════════════════════
//  RENDERING
// ═══════════════════════════════════════════════════════════
function makeCardHTML(ev, showYear){
  const col = CAT[ev.cat] || { text:'#555', bg:'#f0f0f0', emoji:'📌', img:'' };
  const yearHTML = showYear
    ? `<div class="card-img-year">${fy(ev.year)}</div>`
    : `<div class="card-img-year" style="color:transparent;user-select:none;">?</div>`;
  return `
    <div class="card-stripe" style="background:${col.text};flex-shrink:0;height:3px;"></div>
    <div class="card-img-banner">
      ${col.img
        ? `<img src="${col.img}" alt="" loading="lazy" onerror="this.parentElement.style.background='${col.bg}';this.style.display='none'">`
        : `<div style="width:100%;height:100%;background:${col.bg};display:flex;align-items:center;justify-content:center;font-size:28px;">${col.emoji}</div>`}
    </div>
    <div class="card-img-content">
      <div class="card-text-wrap">
        <div class="card-img-cat">${ev.cat}</div>
        <div class="card-img-label">${ev.label}</div>
        <div class="card-img-sublabel">${ev.sublabel}</div>
      </div>
      ${yearHTML}
    </div>`;
}

function renderActiveCard(ev){
  const c = document.getElementById('current-card-container');
  c.innerHTML = '';
  if(!ev) return;
  const card = document.createElement('div');
  card.className = 'event-card';
  card.id = 'active-card';
  card.style.cssText = 'display:flex;flex-direction:column;overflow:hidden;background:var(--surface);';
  card.innerHTML = makeCardHTML(ev, false);
  c.appendChild(card);
  return card;
}

function renderTimeline(flashIdx, flashClass){
  const track = document.getElementById('timeline-track');
  track.innerHTML = '<div class="timeline-line"></div>';
  const sorted = [...timeline].sort((a,b) => a.year - b.year);

  // Start drop zone
  const dz0 = makeDZ(0, 'drop-zone drop-zone-start');
  track.appendChild(dz0);

  sorted.forEach((ev, i) => {
    const item = document.createElement('div');
    item.className = 'tl-item';
    item.dataset.evId = ev.id;
    if(i === flashIdx && flashClass === 'just-correct') item.classList.add('push-in');

    const tick = document.createElement('div');
    tick.className = 'tl-tick';
    const card = document.createElement('div');
    card.className = 'tl-card';
    if(i === flashIdx && flashClass) card.classList.add(flashClass);
    card.style.cssText = 'display:flex;flex-direction:column;overflow:hidden;background:var(--surface);';
    card.innerHTML = makeCardHTML(ev, true);

    item.appendChild(tick);
    item.appendChild(card);
    track.appendChild(item);

    const isLast = i === sorted.length - 1;
    track.appendChild(makeDZ(i + 1, isLast ? 'drop-zone drop-zone-end' : 'drop-zone'));
  });
}

function makeDZ(idx, cls){
  const dz = document.createElement('div');
  dz.className = cls;
  dz.dataset.idx = idx;
  // Phase 2 drag events
  dz.addEventListener('dragenter', e => { e.preventDefault(); dz.classList.add('drag-over'); });
  dz.addEventListener('dragover',  e => { e.preventDefault(); dz.classList.add('drag-over'); });
  dz.addEventListener('dragleave', e => { if(!dz.contains(e.relatedTarget)) dz.classList.remove('drag-over'); });
  dz.addEventListener('drop', e => { e.preventDefault(); dz.classList.remove('drag-over'); handleUserDrop(idx); });
  return dz;
}

// ═══════════════════════════════════════════════════════════
//  PHASE 1 — AUTO-PLACE
// ═══════════════════════════════════════════════════════════
function launchPhase1(){
  phase = 1;
  timeline = [SEED_CARD];
  renderTimeline();
  const card = renderActiveCard(P1_CARD);
  setLabel('<strong>Phase 1</strong> — auto-place');

  const sg = document.getElementById('screen-game');
  sg.classList.add('tut-p1');

  // Scrim on
  document.getElementById('tut-scrim').classList.add('on');

  // Dots
  document.getElementById('tut-dots').classList.add('on');
  document.getElementById('dot0').className = 'tut-dot active';
  document.getElementById('dot1').className = 'tut-dot';

  // Skip
  document.getElementById('tut-skip').classList.add('on');

  // Pill: "Here's how you play"
  setTimeout(() => {
    document.getElementById('tut-pill-icon').textContent = '🎯';
    document.getElementById('tut-pill-text').innerHTML = "Here's how you play";
    posPillAboveCard();
    document.getElementById('tut-pill').classList.add('on');
  }, T.PILL_FADE_IN);

  // Hand appears before flight
  setTimeout(() => {
    showHandOnCard();
  }, T.DELAY_BEFORE_FLY - T.HAND_APPEAR_BEFORE);

  // Start flight
  setTimeout(() => {
    flyCardToTimeline(card);
  }, T.DELAY_BEFORE_FLY);
}

function flyCardToTimeline(card){
  if(phase !== 1) return;
  const hand = document.getElementById('tut-hand');

  // Hide pill
  document.getElementById('tut-pill').classList.remove('on');

  // Get positions
  const cardRect = card.getBoundingClientRect();

  // Compute correct DZ position
  const sorted = [...timeline, P1_CARD].sort((a,b) => a.year - b.year);
  const correctIdx = sorted.findIndex(e => e.id === P1_CARD.id);

  // Get approximate target position from the timeline
  const track = document.getElementById('timeline-track');
  const items = track.querySelectorAll('.tl-item');
  let targetX, targetY;

  if(items.length > 0 && correctIdx <= items.length){
    // Target = between existing items at correctIdx
    if(correctIdx === 0){
      const first = items[0].getBoundingClientRect();
      targetX = first.left - 155/2;
      targetY = first.top + 18; // below tick
    } else if(correctIdx >= items.length){
      const last = items[items.length-1].getBoundingClientRect();
      targetX = last.right + 10;
      targetY = last.top + 18;
    } else {
      const prev = items[correctIdx-1].getBoundingClientRect();
      const next = items[correctIdx] ? items[correctIdx].getBoundingClientRect() : prev;
      targetX = (prev.right + next.left) / 2 - 155/2;
      targetY = prev.top + 18;
    }
  } else {
    // Fallback: center of timeline
    const tw = document.getElementById('timeline-wrapper').getBoundingClientRect();
    targetX = tw.left + tw.width/2 - 155/2;
    targetY = tw.top + 60;
  }

  // Create flying card at card's current position
  const flyCard = document.createElement('div');
  flyCard.className = 'flying-card';
  flyCard.id = 'fly-card';
  flyCard.innerHTML = card.innerHTML;
  flyCard.style.left = cardRect.left + 'px';
  flyCard.style.top = cardRect.top + 'px';
  flyCard.style.setProperty('--fly-dur', T.FLY_DURATION + 'ms');
  document.body.appendChild(flyCard);

  // Hide original card
  card.style.opacity = '0';

  // Set hand fly duration
  hand.style.setProperty('--fly-dur', T.FLY_DURATION + 'ms');

  // Trigger flight after a frame
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      flyCard.classList.add('animate');
      flyCard.style.left = targetX + 'px';
      flyCard.style.top = targetY + 'px';
      flyCard.style.transform = 'scale(0.97)';

      // Hand follows
      hand.classList.add('animate');
      hand.style.left = (targetX + 155/2 - 14) + 'px';
      hand.style.top = (targetY + 90 - 10) + 'px';
    });
  });

  // After flight completes
  setTimeout(() => {
    onPhase1Land();
  }, T.FLY_DURATION + T.LAND_SETTLE);
}

function onPhase1Land(){
  if(phase !== 1) return;

  // Remove flying card and hand
  const fc = document.getElementById('fly-card');
  if(fc) fc.remove();
  document.getElementById('tut-hand').classList.remove('on', 'animate');

  // Insert into timeline for real
  timeline.push(P1_CARD);
  const sorted = [...timeline].sort((a,b) => a.year - b.year);
  const pi = sorted.findIndex(e => e.id === P1_CARD.id);
  renderTimeline(pi, 'just-correct');

  // Update score (free point)
  document.getElementById('score-val').textContent = '1';
  document.getElementById('streak-val').textContent = '1';

  // Clear card stage
  document.getElementById('current-card-container').innerHTML = '';

  // Transition to phase 2
  setTimeout(() => launchPhase2(), T.DELAY_BEFORE_P2);
}

// ═══════════════════════════════════════════════════════════
//  PHASE 2 — GUIDED TRY
// ═══════════════════════════════════════════════════════════
function launchPhase2(){
  phase = 2;
  const sg = document.getElementById('screen-game');
  sg.classList.remove('tut-p1');
  sg.classList.add('tut-p2');
  setLabel('<strong>Phase 2</strong> — user places');

  // Re-render timeline clean (no flash)
  renderTimeline();

  // Show new card
  const card = renderActiveCard(P2_CARD);
  wireCardDrag(card);

  // Scrim stays on
  document.getElementById('tut-scrim').classList.add('on');

  // Dots
  document.getElementById('dot0').className = 'tut-dot done';
  document.getElementById('dot1').className = 'tut-dot active';

  // Pill
  setTimeout(() => {
    document.getElementById('tut-pill-icon').textContent = '🤔';
    document.getElementById('tut-pill-text').innerHTML = 'Look at the date — <em>where does it belong?</em>';
    posPillAboveCard();
    document.getElementById('tut-pill').classList.add('on');
  }, T.P2_PILL_DELAY);

  // Glow correct DZ
  setTimeout(() => {
    markCorrectDZ();
  }, T.P2_GLOW_DELAY);

  // Finger animation — starts after glow is visible
  setTimeout(() => {
    startP2Finger();
  }, T.P2_FINGER_DELAY);
}

function markCorrectDZ(){
  const sorted = [...timeline, P2_CARD].sort((a,b) => a.year - b.year);
  const correctIdx = sorted.findIndex(e => e.id === P2_CARD.id);
  const dzs = document.querySelectorAll('#timeline-track .drop-zone');
  dzs.forEach(dz => {
    if(parseInt(dz.dataset.idx) === correctIdx){
      dz.classList.add('tut-glow', 'tut-correct-dz');
    }
  });
}

function handleUserDrop(dropIdx){
  if(phase !== 2) return;
  phase = 3;

  // Check correctness
  const sorted = [...timeline].sort((a,b) => a.year - b.year);
  const correct = (() => {
    const before = sorted[dropIdx - 1];
    const after  = sorted[dropIdx];
    return (!before || before.year <= P2_CARD.year) &&
           (!after  || after.year  >= P2_CARD.year);
  })();

  // Insert card
  timeline.push(P2_CARD);
  const newSorted = [...timeline].sort((a,b) => a.year - b.year);
  const pi = newSorted.findIndex(e => e.id === P2_CARD.id);

  // Clear card stage
  document.getElementById('current-card-container').innerHTML = '';

  // Render with animation
  renderTimeline(pi, correct ? 'just-correct' : 'wrong-flash');

  if(correct){
    document.getElementById('score-val').textContent = '2';
    document.getElementById('streak-val').textContent = '2';
  }

  // Tutorial complete
  onTutorialDone();
}

function onTutorialDone(){
  // Dismiss all tutorial UI
  stopP2Finger();
  document.getElementById('tut-pill').classList.remove('on');
  document.getElementById('tut-scrim').classList.remove('on');
  document.getElementById('tut-dots').classList.remove('on');
  document.getElementById('tut-skip').classList.remove('on');
  const sg = document.getElementById('screen-game');
  sg.classList.remove('tut-p1', 'tut-p2');

  // Remove glow
  document.querySelectorAll('.tut-glow').forEach(d => d.classList.remove('tut-glow', 'tut-correct-dz'));

  setLabel('<strong>Tutorial complete</strong> — game running');
}

// ═══════════════════════════════════════════════════════════
//  DRAG HANDLING (Phase 2 only)
// ═══════════════════════════════════════════════════════════
function wireCardDrag(card){
  let mouseClone = null, mOX = 0, mOY = 0;

  card.setAttribute('draggable', 'true');

  card.addEventListener('mousedown', () => card.classList.add('pressing'));
  card.addEventListener('mouseup',   () => card.classList.remove('pressing'));
  card.addEventListener('mouseleave',() => card.classList.remove('pressing'));

  card.addEventListener('dragstart', e => {
    card.classList.remove('pressing');
    e.dataTransfer.setData('text/plain','card');
    e.dataTransfer.effectAllowed = 'move';

    // Suppress browser ghost
    const blank = document.createElement('div');
    blank.style.cssText = 'position:fixed;top:-9999px;width:1px;height:1px;';
    document.body.appendChild(blank);
    e.dataTransfer.setDragImage(blank,0,0);
    setTimeout(() => blank.remove(), 0);

    const r = card.getBoundingClientRect();
    mOX = e.clientX - r.left; mOY = e.clientY - r.top;
    mouseClone = card.cloneNode(true);
    mouseClone.style.cssText = `position:fixed;z-index:1000;pointer-events:none;width:${r.width}px;height:${r.height}px;left:${r.left}px;top:${r.top}px;opacity:.92;transform:scale(1.03) translateY(-3px);box-shadow:var(--shadow-lg);border-radius:10px;overflow:hidden;`;
    document.body.appendChild(mouseClone);
    requestAnimationFrame(() => { card.style.visibility = 'hidden'; });
    document.getElementById('screen-game').classList.add('dragging-active');

    // Hide pill and finger on drag
    document.getElementById('tut-pill').classList.remove('on');
    stopP2Finger();

    card.addEventListener('drag', onDrag);
  });

  function onDrag(e){
    if(!mouseClone || (e.clientX===0 && e.clientY===0)) return;
    mouseClone.style.left = (e.clientX - mOX) + 'px';
    mouseClone.style.top  = (e.clientY - mOY) + 'px';
    document.querySelectorAll('.drop-zone').forEach(dz => {
      const r = dz.getBoundingClientRect();
      dz.classList.toggle('drag-over', e.clientX>=r.left && e.clientX<=r.right && e.clientY>=r.top && e.clientY<=r.bottom);
    });
  }

  card.addEventListener('dragend', () => {
    if(mouseClone){ mouseClone.remove(); mouseClone = null; }
    card.removeEventListener('drag', onDrag);
    card.style.visibility = '';
    card.classList.remove('pressing');
    document.getElementById('screen-game').classList.remove('dragging-active');
    document.querySelectorAll('.drop-zone').forEach(d => d.classList.remove('drag-over'));
  });

  // Touch support
  let tClone = null, tOX = 0, tOY = 0, isDrag = false;
  card.addEventListener('touchstart', e => {
    card.classList.add('pressing');
    const t = e.touches[0], r = card.getBoundingClientRect();
    tOX = t.clientX - r.left; tOY = t.clientY - r.top; isDrag = false;
    tClone = card.cloneNode(true);
    tClone.style.cssText = `position:fixed;z-index:1000;pointer-events:none;width:${r.width}px;height:${r.height}px;left:${r.left}px;top:${r.top}px;opacity:0;transform:scale(1.03) translateY(-3px);box-shadow:var(--shadow-lg);border-radius:10px;overflow:hidden;transition:opacity .1s;`;
    document.body.appendChild(tClone);
  }, {passive:true});

  card.addEventListener('touchmove', e => {
    if(!tClone) return;
    const t = e.touches[0];
    if(!isDrag){
      isDrag = true; tClone.style.opacity = '.92'; card.style.visibility = 'hidden';
      card.classList.remove('pressing');
      document.getElementById('screen-game').classList.add('dragging-active');
      document.getElementById('tut-pill').classList.remove('on');
      stopP2Finger();
    }
    tClone.style.left = (t.clientX - tOX) + 'px';
    tClone.style.top = (t.clientY - tOY) + 'px';
    document.querySelectorAll('.drop-zone').forEach(dz => {
      const r = dz.getBoundingClientRect();
      dz.classList.toggle('drag-over', t.clientX>=r.left && t.clientX<=r.right && t.clientY>=r.top && t.clientY<=r.bottom);
    });
  }, {passive:true});

  card.addEventListener('touchend', e => {
    const t = e.changedTouches[0]; const was = isDrag; isDrag = false;
    if(tClone){ tClone.remove(); tClone = null; }
    card.style.visibility = ''; card.classList.remove('pressing');
    document.getElementById('screen-game').classList.remove('dragging-active');
    if(was){
      document.querySelectorAll('.drop-zone').forEach(dz => {
        const r = dz.getBoundingClientRect();
        if(t.clientX>=r.left && t.clientX<=r.right && t.clientY>=r.top && t.clientY<=r.bottom){
          dz.classList.remove('drag-over');
          handleUserDrop(parseInt(dz.dataset.idx));
        }
      });
    }
  });
}

// ═══════════════════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════════════════
function showHandOnCard(){
  const card = document.getElementById('active-card');
  if(!card) return;
  const hand = document.getElementById('tut-hand');
  const r = card.getBoundingClientRect();
  hand.style.left = (r.left + r.width/2 - 14) + 'px';
  hand.style.top  = (r.top + r.height/2 - 10) + 'px';
  hand.classList.remove('animate');
  hand.classList.add('on');
}

function posPillAboveCard(){
  const card = document.getElementById('active-card');
  if(!card) return;
  const r = card.getBoundingClientRect();
  const pill = document.getElementById('tut-pill');
  pill.style.left = Math.max(8, r.left + r.width/2 - 140) + 'px';
  pill.style.top  = Math.max(52, r.top - 58) + 'px';
}

// ── Phase 2 finger animation — drags from card to correct DZ ──
let _p2FingerRAF = null;

function startP2Finger(){
  const finger = document.getElementById('tut-finger');
  const card   = document.getElementById('active-card');
  const glowDZ = document.querySelector('.tut-glow');
  if(!card || !glowDZ) return;

  const cr = card.getBoundingClientRect();
  const dr = glowDZ.getBoundingClientRect();
  const sx = cr.left + cr.width/2 - 14, sy = cr.top + cr.height/2 - 10;
  const ex = dr.left + dr.width/2 - 14, ey = dr.top + dr.height/2 - 10;

  finger.style.left = sx + 'px';
  finger.style.top  = sy + 'px';
  finger.classList.add('on');

  let p = 0, dir = 1, pause = 0;
  function tick(){
    if(!finger.classList.contains('on')) return;
    if(pause > 0){ pause--; _p2FingerRAF = requestAnimationFrame(tick); return; }
    p += 0.013 * dir;
    if(p >= 1){ p = 1; dir = -1; pause = 45; }
    else if(p <= 0){ p = 0; dir = 1; pause = 22; }
    const t = p < 0.5 ? 4*p*p*p : 1 - Math.pow(-2*p+2,3)/2;
    const sc = (p > 0.05 && p < 0.92) ? 0.86 : 1;
    finger.style.left      = (sx + (ex - sx) * t) + 'px';
    finger.style.top       = (sy + (ey - sy) * t) + 'px';
    finger.style.transform = `scale(${sc})`;
    _p2FingerRAF = requestAnimationFrame(tick);
  }
  _p2FingerRAF = requestAnimationFrame(tick);
}

function stopP2Finger(){
  if(_p2FingerRAF){ cancelAnimationFrame(_p2FingerRAF); _p2FingerRAF = null; }
  document.getElementById('tut-finger').classList.remove('on');
}

function setLabel(h){ document.getElementById('demo-lbl').innerHTML = h; }

function skipTutorial(){
  phase = 0;
  // Remove everything
  document.getElementById('tut-scrim').classList.remove('on');
  document.getElementById('tut-pill').classList.remove('on');
  document.getElementById('tut-dots').classList.remove('on');
  document.getElementById('tut-skip').classList.remove('on');
  document.getElementById('tut-hand').classList.remove('on','animate');
  stopP2Finger();
  const sg = document.getElementById('screen-game');
  sg.classList.remove('tut-p1','tut-p2');
  const fc = document.getElementById('fly-card');
  if(fc) fc.remove();
  document.querySelectorAll('.tut-glow').forEach(d => d.classList.remove('tut-glow','tut-correct-dz'));
  setLabel('<strong>Skipped</strong>');
}

function reset(){
  skipTutorial();
  document.getElementById('score-val').textContent = '0';
  document.getElementById('streak-val').textContent = '0';
  setTimeout(() => launchPhase1(), 300);
}

function jumpP2(){
  skipTutorial();
  timeline = [SEED_CARD, P1_CARD];
  document.getElementById('score-val').textContent = '1';
  document.getElementById('streak-val').textContent = '1';
  renderTimeline();
  setTimeout(() => launchPhase2(), 300);
}

// ═══ Boot ═══
window.addEventListener('load', () => {
  setTimeout(() => launchPhase1(), 400);
});
</script>
